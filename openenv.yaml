spec_version: 1
name: customer_support_env
description: >
  An AI-powered customer support ticket resolution environment where agents
  learn to handle realistic support tickets end-to-end — from reading queries,
  classifying issues, responding to customers, and escalating when needed.
  Simulates a real-world SaaS customer support workflow with 16 curated
  ticket scenarios across three difficulty levels.
type: space
runtime: fastapi
app: env.server.app:app
port: 8000

tasks:
  - name: easy
    description: >
      Basic FAQ resolution. Simple single-step queries such as password reset,
      pricing info, and data export. Agent must classify, reply correctly, and resolve.
    difficulty: easy
    grader: env.graders.grade_easy

  - name: medium
    description: >
      Multi-step issue handling. Billing disputes, technical bugs, and security concerns
      requiring investigation. Agent must classify, gather info, provide solution, and resolve.
    difficulty: medium
    grader: env.graders.grade_medium

  - name: hard
    description: >
      Complex escalation cases. Angry high-priority customers with multiple issues,
      urgency, and emotional tone. Agent must empathize, classify, escalate correctly,
      and resolve.
    difficulty: hard
    grader: env.graders.grade_hard

action_space:
  type: object
  model: env.models.SupportAction
  fields:
    action_type:
      type: string
      enum: [classify_issue, reply, escalate, resolve, request_more_info]
      description: The type of action to take
    category:
      type: string
      enum: [billing, technical, account, general]
      description: Required for classify_issue action
      optional: true
    message:
      type: string
      description: Required for reply action — the response text
      optional: true
    team:
      type: string
      enum: [billing_team, technical_team, management, security_team]
      description: Required for escalate action — the target team
      optional: true

observation_space:
  type: object
  model: env.models.SupportObservation
  fields:
    ticket_id:
      type: string
      description: Unique ticket identifier
    ticket_text:
      type: string
      description: The customer's support message
    customer_name:
      type: string
      description: Customer name
    customer_priority:
      type: string
      enum: [low, medium, high, critical]
      description: Customer priority level
    customer_history:
      type: array
      description: Previous customer interactions
    conversation_history:
      type: array
      description: Messages exchanged in this episode
    ticket_status:
      type: string
      enum: [open, classified, escalated, resolved]
      description: Current ticket status
    goal:
      type: string
      description: What the agent should accomplish
    current_task:
      type: string
      enum: [easy, medium, hard]
      description: Current task difficulty level
    done:
      type: boolean
      description: Whether the episode has ended
    reward:
      type: float
      description: Step reward value
    metadata:
      type: object
      description: Additional info including final_score at episode end

reward_space:
  type: object
  model: env.models.SupportReward
  range: [0.0, 1.0]
  description: >
    Step rewards provide shaped signal throughout the episode.
    Final grader score is between 0.0 and 1.0.
